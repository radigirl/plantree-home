<div class="meal-details-page">
  <a [routerLink]="backLink" class="back-link">
    <span class="back-link__icon">←</span>
    <span>Back</span>
  </a>

  <div class="meal-details-loading" *ngIf="isLoading">
    <app-page-loading></app-page-loading>
  </div>

  <div *ngIf="!isLoading && meal" class="meal-details-card-shell">
    <div class="meal-details-card">
      <div class="meal-details-header">
        <div class="meal-details-header-row">
          <h1 class="meal-details-title">
            {{ meal.name }}
          </h1>

          <button
            *ngIf="canEdit && !isEditing"
            type="button"
            class="edit-meal-button"
            (click)="startEdit()"
          >
            Edit meal
          </button>
        </div>
      </div>

      <ng-container *ngIf="!isEditing; else editMode">
        <div class="meal-image">
          <img
            [src]="meal.image || 'assets/meals/default-meal.png'"
            class="meal-image-img"
            [alt]="meal.name"
          />
        </div>

        <div class="meal-details-meta">
          <span class="meal-time" *ngIf="meal.prepTime != null">
            <span class="meal-time-icon">◷</span>
            {{ meal.prepTime }} min
          </span>

          <span class="meal-status" *ngIf="(meal.ingredients?.length ?? 0) > 0">
            {{ meal.ingredients?.length }} ingredient<span *ngIf="(meal.ingredients?.length ?? 0) > 1">s</span>
          </span>
        </div>

        <div class="meal-details-section">
          <h3>Ingredients</h3>

          <p *ngIf="(meal.ingredients?.length ?? 0) === 0" class="meal-details-empty">
            No ingredients added yet.
          </p>

          <ul *ngIf="(meal.ingredients?.length ?? 0) > 0" class="meal-details-list">
            <li *ngFor="let ingredient of meal.ingredients">
              {{ ingredient }}
            </li>
          </ul>
        </div>

        <div class="meal-details-section">
          <h3>Instructions</h3>

          <p *ngIf="!meal.instructions" class="meal-details-empty">
            No instructions added yet.
          </p>

          <p *ngIf="meal.instructions" class="meal-details-text">
            {{ meal.instructions }}
          </p>
        </div>
      </ng-container>

      <ng-template #editMode>
        <div class="add-meal-form">
          <div class="add-meal-field">
            <label for="editMealName">Meal name</label>
            <input
              id="editMealName"
              type="text"
              [(ngModel)]="editMealName"
              placeholder="Enter meal name"
            />
          </div>

          <div class="add-meal-field">
            <label for="editPrepTime">Prep time (minutes)</label>
            <input
              id="editPrepTime"
              type="number"
              min="0"
              [(ngModel)]="editPrepTime"
              placeholder="Optional"
            />
          </div>

          <div class="add-meal-field">
            <label for="editIngredients">Ingredients</label>
            <input
              id="editIngredients"
              type="text"
              [(ngModel)]="editIngredientsText"
              placeholder="e.g. Pasta, Tomato sauce, Parmesan"
            />
          </div>

          <div class="add-meal-field">
            <label for="editInstructions">Instructions</label>
            <textarea
              id="editInstructions"
              [(ngModel)]="editInstructions"
              rows="5"
              placeholder="e.g. Cook pasta, make the sauce, combine and serve."
            ></textarea>
          </div>

          <div class="add-meal-field">
            <label for="editMealImage">Meal photo</label>
            <input
              id="editMealImage"
              type="file"
              accept="image/*"
              (change)="onMealImageSelected($event)"
            />

            <div class="meal-image-preview" *ngIf="selectedImagePreview">
              <img
                [src]="selectedImagePreview"
                alt="Selected meal preview"
                class="meal-image-preview__img"
              />

              <button
                type="button"
                class="cancel-button"
                (click)="removeSelectedMealImage()"
              >
                Remove photo
              </button>
            </div>
          </div>

          <div class="add-meal-actions">
            <button
              type="button"
              class="save-button"
              (click)="saveMeal()"
            >
              Save
            </button>

            <button
              type="button"
              class="cancel-button"
              (click)="cancelEdit()"
            >
              Cancel
            </button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>

  <div *ngIf="!isLoading && !meal" class="meal-details-card-shell">
    <div class="meal-details-card">
      <h1 class="meal-details-title">Meal not found</h1>
      <p class="meal-details-subtitle">
        This meal could not be loaded.
      </p>
    </div>
  </div>
</div>
