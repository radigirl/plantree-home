<section class="manage-members-page">
  <div class="page-header-row">
    <div class="page-header">
      <h1 class="page-title">
        {{ 'settings.members' | translate }}
      </h1>

      <p class="page-subtitle">
        {{ 'members.manageSubtitle' | translate }}
      </p>
    </div>

    <button type="button" class="action-pill action-pill--primary" (click)="onAddMember()">
      + {{ 'common.add' | translate }}
    </button>
  </div>

  <div class="manage-members-content">
    <div
      class="manage-members-row"
      *ngFor="let member of members"
      [class.manage-members-row--active]="member.id === currentMember?.id"
      (click)="onEditMember(member)"
    >
      <div class="manage-members-row__main">
        <span class="manage-members-row__avatar">
          <ng-container *ngIf="member.avatar_url; else memberFallback">
            <img [src]="member.avatar_url" [alt]="member.name" />
          </ng-container>

          <ng-template #memberFallback>
            <lucide-icon [img]="userIcon" [size]="17"></lucide-icon>
          </ng-template>
        </span>

        <span class="manage-members-row__name">{{ member.name }}</span>

        <lucide-icon
          *ngIf="member.id === currentMember?.id"
          class="manage-members-row__check"
          [img]="checkIcon"
          [size]="20">
        </lucide-icon>
      </div>
    </div>
  </div>
</section>

<app-member-dialog
  [isOpen]="isMemberDialogOpen"
  [mode]="memberDialogMode"
  [initialName]="memberDialogInitialName"
  [initialAvatarUrl]="memberDialogInitialAvatarUrl"
  [membersCount]="members.length"
  (closed)="closeMemberDialog()"
  (saved)="onMemberDialogSave($event)"
  (deleteMember)="onDeleteMemberFromDialog()">
</app-member-dialog>

<div *ngIf="isDeleteConfirmOpen" class="member-confirmation-backdrop" (click)="cancelMemberConfirm()">
  <div class="member-confirmation-dialog-wrap" (click)="$event.stopPropagation()">
    <app-confirmation-dialog
      [title]="'members.deleteConfirmTitle' | translate"
      [message]="'members.deleteConfirmMessage' | translate"
      [confirmLabel]="'members.deleteConfirmButton' | translate"
      [cancelLabel]="'common.cancel' | translate"
      (cancel)="cancelMemberConfirm()"
      (confirm)="confirmDeleteMember()">
    </app-confirmation-dialog>
  </div>
</div>

<app-snackbar [message]="toastMessage" [isVisible]="isToastVisible">
</app-snackbar>
