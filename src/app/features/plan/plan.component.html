<div class="plan-page">
  <div class="plan-loading-shell" *ngIf="isLoading">
    <app-page-loading></app-page-loading>
  </div>

  <ng-container *ngIf="!isLoading">

    <div class="week-navigation">
      <div class="week-navigation__side week-navigation__side--left">
        <button type="button" class="week-nav-btn" (click)="goToPreviousWeek()" aria-label="Previous week">
          <lucide-icon [img]="chevronLeftIcon"></lucide-icon>
        </button>
      </div>

      <div class="week-navigation__center">
        <div class="week-label">
          {{ getWeekLabel() }}
        </div>
      </div>

      <div class="week-navigation__side week-navigation__side--right">
        <button type="button" class="week-nav-btn" (click)="goToNextWeek()" aria-label="Next week">
          <lucide-icon [img]="chevronRightIcon"></lucide-icon>
        </button>

        <button type="button" class="calendar-btn" (click)="openCalendar()" aria-label="Pick a date">
          <lucide-icon [img]="calendarIcon"></lucide-icon>
        </button>

        <button type="button" class="today-btn" [class.today-btn--active]="!isViewingCurrentWeek()"
          (click)="goToToday()">
          Today
        </button>
      </div>
    </div>

    <div class="week-strip">
      <button type="button" class="week-strip__day" *ngFor="let item of weekMeals; let i = index"
        [class.week-strip__day--today]="isTodayIndex(i)" [class.week-strip__day--past]="isPastDayIndex(i)"
        (click)="scrollToDay(i)">
        <span class="week-strip__label">{{ item.day }}</span>
        <span class="week-strip__date">{{ item.date }}</span>
      </button>
    </div>

    <div class="meal-list">
      <div #mealCard class="meal-card" *ngFor="let item of weekMeals; let i = index"
        [class.meal-card--past]="isPastDayIndex(i)" [class.meal-card--today]="isTodayIndex(i)"
        [class.meal-card--empty]="!hasMeals(item)" (click)="openDayDetails(item.fullDate)">
        <div class="meal-card__top" [class.meal-card__top--filled]="hasMeals(item)"
          [class.meal-card__top--empty]="!hasMeals(item)">
          <div class="meal-day" [class.meal-day--center]="hasMeals(item)">
            <span class="day">{{ item.day }}</span>
            <span class="date">{{ item.date }}</span>
          </div>

          <button
            type="button"
            class="meal-add-btn meal-add-btn--circle meal-add-btn--corner"
            *ngIf="!isPastDayIndex(i)"
            (click)="onAddMealClick($event, item.fullDate)">
            +
          </button>
        </div>

        <div class="meal-info">
          <ng-container *ngIf="hasMeals(item); else emptyDay">
            <div class="meal-info__main">
              <div class="meal-image">
                <img [src]="getFirstMeal(item)?.meal?.image_url || 'assets/meals/default-meal.png'" class="meal-image-img"
                  [alt]="getFirstMeal(item)?.meal?.name || 'Meal image'" />
              </div>

              <div class="meal-details">
                <p class="meal-name">
                  {{ getFirstMeal(item)?.meal?.name }}
                </p>

                <div class="meal-cook-row">
                  <span class="meal-cook-label">Cook:</span>

                  <img [src]="getFirstMeal(item)?.cook?.avatar_url || 'assets/avatars/unassigned.png'"
                    class="meal-cook-avatar" [alt]="getFirstMeal(item)?.cook?.name || 'Cook avatar'" />

                  <p class="meal-cook">
                    {{ getFirstMeal(item)?.cook?.name || 'Unassigned' }}
                  </p>
                </div>

                <div class="meal-meta" *ngIf="getFirstMeal(item) as firstMeal">
                  <span class="meal-status">
                    {{ getStatusLabel(firstMeal.status) }}
                  </span>

                  <span class="meal-time" *ngIf="firstMeal.meal.prepTime != null">
                    <span class="meal-time-icon">◷</span>
                    {{ firstMeal.meal.prepTime }} min
                  </span>
                </div>

                <p class="meal-more" [class.meal-more--hidden]="getAdditionalMealsCount(item) === 0">
                  <ng-container *ngIf="getAdditionalMealsCount(item) > 0">
                    <span class="meal-more__text">
                      +{{ getAdditionalMealsCount(item) }} more meal<span
                        *ngIf="getAdditionalMealsCount(item) > 1">s</span>
                    </span>
                    <span class="meal-more__arrow">→</span>
                  </ng-container>
                </p>
              </div>
            </div>
          </ng-container>

          <ng-template #emptyDay>
            <div class="meal-empty-state">
              <p class="meal-empty-text">No meal planned</p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </ng-container>
</div>

<div class="calendar-picker-sheet-overlay" *ngIf="isCalendarOpen" (click)="closeCalendar()">
  <div class="calendar-picker-sheet" (click)="$event.stopPropagation()">
    <div class="calendar-picker-sheet__handle"></div>

    <app-calendar-picker [title]="'Pick a date'" [selectionMode]="'single'" [selectedDates]="selectedCalendarDates"
      [showFooterActions]="false" [autoConfirmOnSingleSelect]="true"
      (selectedDatesChange)="onCalendarDatesChange($event)"
      (confirm)="confirmCalendarDates($event)"></app-calendar-picker>
  </div>
</div>
