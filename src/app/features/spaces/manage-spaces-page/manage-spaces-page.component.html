<section class="manage-spaces-page">
  <div class="page-header-row">
    <div class="page-header">
      <h1 class="page-title">
        {{ 'settings.spaces' | translate }}
      </h1>

      <p class="page-subtitle">
        {{ 'settings.spacesSubtitle' | translate }}
      </p>
    </div>

    <button type="button" class="action-pill action-pill--primary" (click)="onAddSpace()">
      + {{ 'common.add' | translate }}
    </button>
  </div>

  <div class="manage-spaces-content" *ngIf="currentSpace$ | async as currentSpace">
    <div class="manage-spaces-row" *ngFor="let space of spaces"
      [class.manage-spaces-row--active]="space.id === currentSpace.id" (click)="onEditSpace(space)">
      <div class="manage-spaces-row__main">
        <span class="manage-spaces-row__name">{{ space.name }}</span>

        <lucide-icon *ngIf="space.id === currentSpace.id" class="manage-spaces-row__check" [img]="checkIcon"
          [size]="20">
        </lucide-icon>
      </div>

      <button type="button" class="manage-spaces-row__remove" (click)="onDeleteSpace(space); $event.stopPropagation()"
        [attr.aria-label]="'common.delete' | translate">
        ×
      </button>
    </div>
  </div>
</section>

<app-space-dialog [isOpen]="isSpaceDialogOpen" [mode]="spaceDialogMode" [initialName]="spaceDialogInitialName"
  [spacesCount]="spaces.length" (closed)="closeSpaceDialog()" (saved)="onSpaceDialogSave($event)"
  (resetSpace)="onResetSpaceFromDialog()" (deleteSpace)="onDeleteSpaceFromDialog()">
</app-space-dialog>

<div *ngIf="spaceConfirmMode" class="space-confirmation-backdrop" (click)="cancelSpaceConfirm()">
  <div class="space-confirmation-dialog-wrap" (click)="$event.stopPropagation()">
    <app-confirmation-dialog
      [title]="spaceConfirmMode === 'reset' ? 'Изчисти данните?' : 'Изтрий мястото?'"
      [message]="spaceConfirmMode === 'reset'
        ? 'Това ще премахне данните за това място, но ще запази самото място.'
        : 'Това ще изтрие мястото и свързаните с него данни. Запазените ястия няма да бъдат изтрити.'"
      [confirmLabel]="spaceConfirmMode === 'reset' ? 'Изчисти' : 'Изтрий'"
      [cancelLabel]="'common.cancel' | translate"
      (cancel)="cancelSpaceConfirm()"
      (confirm)="spaceConfirmMode === 'reset' ? confirmResetSpace() : confirmDeleteSpace()">
    </app-confirmation-dialog>
  </div>
</div>
