<div class="meal-dialog-overlay" *ngIf="isOpen" (click)="onOverlayClick()">
  <div class="meal-dialog" (click)="$event.stopPropagation()">

    <div class="meal-dialog__content">
      <h3 class="meal-dialog__title">
        {{ mode === 'edit'
          ? ('mealDialog.editTitle' | translate)
          : ('mealDialog.createTitle' | translate) }}
      </h3>

      <!-- Meal name -->
      <div class="meal-field">
        <label for="dialogMealName">{{ 'mealDialog.mealName' | translate }}</label>
        <input
          id="dialogMealName"
          type="text"
          [(ngModel)]="mealName"
          [placeholder]="'mealDialog.mealNamePlaceholder' | translate"
        />
      </div>

      <!-- Prep time -->
      <div class="meal-field">
        <label for="prepTime">{{ 'mealDialog.prepTime' | translate }}</label>
        <input
          id="prepTime"
          type="number"
          min="0"
          [(ngModel)]="prepTime"
          [placeholder]="'mealDialog.optional' | translate"
        />
      </div>

      <!-- Ingredients -->
      <div class="meal-field">
        <label>{{ 'mealDialog.ingredients' | translate }}</label>

        <div class="form-helper">
          {{ 'mealDialog.ingredientsHelper' | translate }}
        </div>

        <div class="form-helper examples">
          {{ 'mealDialog.ingredientsExample' | translate }}
        </div>

        <div class="form-helper examples">
          {{ 'mealDialog.quantityTip' | translate }}
        </div>

        <textarea
          [(ngModel)]="ingredientsText"
          [placeholder]="'mealDialog.ingredientsPlaceholder' | translate"
          rows="4"
        ></textarea>
      </div>

      <!-- Instructions -->
      <div class="meal-field">
        <label for="instructions">{{ 'mealDialog.instructions' | translate }}</label>
        <textarea
          id="instructions"
          [(ngModel)]="instructions"
          rows="4"
          [placeholder]="'mealDialog.instructionsPlaceholder' | translate"
        ></textarea>
      </div>

      <!-- Image -->
      <div class="meal-field">
        <label>{{ 'mealDialog.mealPhoto' | translate }}</label>

        <div class="meal-image-block">

          <!-- Preview -->
          <div class="meal-image-thumb" *ngIf="selectedImagePreview">
            <img [src]="selectedImagePreview" [alt]="'mealDialog.previewAlt' | translate" />
          </div>

          <!-- Upload -->
          <div class="meal-image-content">
            <label class="meal-image-upload">
              <span class="meal-image-upload__button">
                {{ 'mealDialog.chooseFile' | translate }}
              </span>

              <span class="meal-image-upload__name">
                {{ selectedImageFile?.name || imageName || ('mealDialog.noFileChosen' | translate) }}
              </span>

              <input
                type="file"
                accept="image/*"
                class="meal-image-upload__input"
                (change)="onMealImageSelected($event)"
              />
            </label>

            <!-- Remove -->
            <button
              *ngIf="selectedImagePreview"
              type="button"
              class="meal-image-remove"
              (click)="removeSelectedMealImage()"
            >
              ✕ {{ 'common.remove' | translate }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="button-row meal-dialog__actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">
        {{ 'common.cancel' | translate }}
      </button>

      <button type="button" class="btn-primary" [disabled]="isSaving" (click)="onSave()">
        {{ isSaving
          ? ('mealDialog.saving' | translate)
          : (mode === 'edit'
              ? ('mealDialog.update' | translate)
              : ('mealDialog.save' | translate)) }}
      </button>
    </div>

  </div>
</div>
