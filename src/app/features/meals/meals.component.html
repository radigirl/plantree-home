<app-page-loading *ngIf="isLoading"></app-page-loading>

<div *ngIf="!isLoading" class="meals-page">
  <div class="meals-shell">
    <div class="page-header-row">
      <div class="page-header">
        <h1 class="page-title">My Meals</h1>
        <p class="page-subtitle">Create and manage your saved meals</p>
      </div>

      <button type="button" class="action-pill action-pill--primary" *ngIf="!isMealDialogOpen" (click)="startAddMeal()">
        + Add
      </button>
    </div>

    <div class="meals-search-sticky">
      <div class="search-bar">
        <div class="search-input-wrap">
          <input type="text" [(ngModel)]="mealSearchQuery" placeholder="Search meals..." />

          <button *ngIf="mealSearchQuery" type="button" class="search-clear" (click)="clearMealSearch()">
            ×
          </button>
        </div>
      </div>
    </div>

    <div class="meal-search-results" *ngIf="isSearching">
      <button type="button" class="meal-search-result" *ngFor="let meal of filteredMeals; trackBy: trackByMealId"
        (click)="openSearchMealDetails(meal)">
        <div class="meal-search-result__image">
          <img [src]="meal.image_url || 'assets/meals/default-meal.png'" [alt]="meal.name" />
        </div>

        <div class="meal-search-result__content">
          <div class="meal-search-result__main">
            <span class="meal-search-result__title">
              {{ meal.name }}
            </span>

            <span class="meal-search-result__meta" *ngIf="meal.prepTime != null">
              {{ meal.prepTime }} min
            </span>
          </div>

          <div class="meal-search-result__menu-wrapper" (click)="$event.stopPropagation()">
            <button type="button" class="meal-search-result__menu" (click)="$event.stopPropagation(); toggleMealMenu(meal)" aria-label="Meal actions">
              ⋮
            </button>
          </div>
        </div>
      </button>

      <p class="meals-empty-text" *ngIf="filteredMeals.length === 0">
        No meals found.
      </p>
    </div>

    <div class="meals-empty" *ngIf="!isSearching && !hasMeals">
      <p class="meals-empty-text">No saved meals yet.</p>
    </div>

    <div class="meals-list" *ngIf="!isSearching && hasMeals">
      <div class="meal-card" [attr.id]="'meal-card-' + meal.id" *ngFor="let meal of meals; trackBy: trackByMealId"
        (click)="openSearchMealDetails(meal)">
        <div class="meal-menu-wrapper" (click)="$event.stopPropagation()">
          <button type="button" class="meal-menu-button" (click)="$event.stopPropagation(); toggleMealMenu(meal)" aria-label="Meal actions" aria-haspopup="menu"
            [attr.aria-expanded]="openMealMenuId === meal.id">
            ⋮
          </button>

          <div class="meal-menu-dropdown" *ngIf="openMealMenuId === meal.id && !isMobileViewport()">
            <button type="button" class="meal-menu-item"
              (click)="$event.stopPropagation(); closeMealMenu(); startEditMeal(meal)">
              Edit meal
            </button>

            <button type="button" class="meal-menu-item"
              (click)="$event.stopPropagation(); closeMealMenu(); mealDialogMode = 'createFromExisting'; mealDialogInitialMeal = meal; isMealDialogOpen = true">
              Create from this
            </button>

            <button type="button" class="meal-menu-item"
              (click)="$event.stopPropagation(); closeMealMenu(); selectedMealForActions = meal; mealActionSheetMode = 'addToPlan'; openMealMenuId = meal.id">
              Add to Plan
            </button>

            <button type="button" class="meal-menu-item meal-menu-item--danger"
              (click)="$event.stopPropagation(); closeMealMenu(); onDeleteMeal(meal)">
              Remove from My Meals
            </button>
          </div>
        </div>

        <div class="meal-main">
          <div class="meal-info">
            <div class="meal-title-block">
              <p class="meal-name">
                {{ meal.name }}
              </p>
            </div>

            <div class="meal-meta-row">
              <div class="meal-meta">
                <span class="meal-time" *ngIf="meal.prepTime != null">
                  <span class="meal-time-icon">◷</span>
                  {{ meal.prepTime }} min
                </span>

                <span class="meal-info-chip" *ngIf="meal.ingredients?.length as ingredientsCount">
                  {{ ingredientsCount }} ingredient<span *ngIf="ingredientsCount > 1">s</span>
                </span>
              </div>
            </div>

          </div>

          <div class="meal-image">
            <img [src]="meal.image_url || 'assets/meals/default-meal.png'" class="meal-image-img" [alt]="meal.name" />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-responsive-action-menu *ngIf="selectedMealForActions && mealActionSheetMode !== 'pickDate'"
  [isOpen]="!!openMealMenuId" [title]="mealActionSheetMode === 'actions' ? selectedMealForActions.name : 'Add to Plan'"
  [subtitle]="mealActionSheetMode === 'actions'
    ? (selectedMealForActions.prepTime != null ? (selectedMealForActions.prepTime + ' min') : '')
    : selectedMealForActions.name" [image]="selectedMealForActions.image_url || 'assets/meals/default-meal.png'"
  [actions]="mealActionSheetMode === 'actions' ? mealActions : addToPlanActions" (closed)="closeMealMenu()"
  (actionSelected)="onMealActionSelected($event)"></app-responsive-action-menu>

<div class="calendar-picker-sheet-overlay" *ngIf="selectedMealForActions && mealActionSheetMode === 'pickDate'"
  (click)="closeMealMenu()">
  <div class="calendar-picker-sheet" (click)="$event.stopPropagation()">
    <div class="calendar-picker-sheet__handle"></div>

    <div class="calendar-picker-sheet__mode-toggle">
      <button type="button" class="calendar-picker-sheet__mode-btn"
        [class.calendar-picker-sheet__mode-btn--active]="calendarSelectionMode === 'single'"
        (click)="calendarSelectionMode = 'single'; selectedPlanDates = []">
        Single day
      </button>

      <button type="button" class="calendar-picker-sheet__mode-btn"
        [class.calendar-picker-sheet__mode-btn--active]="calendarSelectionMode === 'multiple'"
        (click)="calendarSelectionMode = 'multiple'; selectedPlanDates = []">
        Multiple days
      </button>
    </div>

    <app-calendar-picker [title]="'Add ' + selectedMealForActions.name + ' to plan'"
      [selectionMode]="calendarSelectionMode" [selectedDates]="selectedPlanDates"
      (selectedDatesChange)="onCalendarDatesChange($event)" (confirm)="confirmPickedDates($event)"
      (cancel)="closeMealMenu()"></app-calendar-picker>
  </div>
</div>


<app-meal-details-modal [meal]="selectedSearchMeal" [isOpen]="isSearchMealDetailsOpen"
  (close)="closeSearchMealDetails()"></app-meal-details-modal>

<app-meal-dialog [isOpen]="isMealDialogOpen" [mode]="mealDialogMode" [initialMeal]="mealDialogInitialMeal"
  (close)="closeMealDialog()" (save)="onMealDialogSave($event)"></app-meal-dialog>

<div class="delete-dialog-overlay" *ngIf="isDeleteDialogOpen" (click)="closeDeleteDialog()">
  <div class="delete-dialog-shell" (click)="$event.stopPropagation()">
    <app-confirmation-dialog [title]="'Remove meal'"
      [message]="'Remove &quot;' + (mealToDelete?.name || '') + '&quot; from your My Meals? You can still access it through other members or past plans.'"
      [confirmLabel]="'Remove'" [cancelLabel]="'Cancel'" (cancel)="closeDeleteDialog()"
      (confirm)="confirmDeleteMeal()"></app-confirmation-dialog>
  </div>
</div>

<app-snackbar [message]="snackbarMessage" [isVisible]="isSnackbarVisible" [actionLabel]="snackbarActionLabel"
  (actionClicked)="hideToast()"></app-snackbar>
