<section class="lists-page">
  <div *ngIf="isLoading" class="lists-loading">
    <app-page-loading></app-page-loading>
  </div>

  <ng-container *ngIf="!isLoading">

    <!-- HEADER -->
    <div class="lists-header">
      <h1 class="lists-title">Grocery Lists</h1>

      <button *ngIf="!isCreatingList" type="button" class="button-pill-primary add-button" (click)="startCreateList()">
        + Add list
      </button>
    </div>

    <!-- CREATE / EDIT -->
    <!-- CREATE -->
    <div *ngIf="isCreatingList" class="list-form-card">
      <input type="text" placeholder="Enter list name" [(ngModel)]="newListName" class="list-form-input" />

      <div class="list-form-actions">
        <button class="save-button" (click)="saveNewList()">
          Save
        </button>

        <button class="cancel-button" (click)="cancelCreateList()">
          Cancel
        </button>
      </div>
    </div>

    <!-- EDIT -->
    <div *ngIf="editingListId !== null" class="list-form-card">
      <input type="text" placeholder="Edit list name" [(ngModel)]="editListName" class="list-form-input" />

      <div class="list-form-actions">
        <button class="save-button" (click)="saveEditedList()">
          Save
        </button>

        <button class="cancel-button" (click)="cancelEditList()">
          Cancel
        </button>
      </div>
    </div>

    <p *ngIf="error" class="lists-error">{{ error }}</p>

    <!-- LISTS -->
    <div *ngIf="!error && groceryLists.length > 0; else empty" class="lists-list">

      <div class="list-card" [class.list-card--menu-open]="openMenuListId === list.id" *ngFor="let list of groceryLists" (click)="openList(list)">
        <!-- MENU -->
        <div class="list-menu-wrapper" (click)="$event.stopPropagation()">
          <button type="button" class="list-menu-button" (click)="toggleActionsMenu($event, list)">
            ⋯
          </button>

          <div *ngIf="openMenuListId === list.id" class="list-menu-dropdown dropdown-list-surface">
            <button type="button" class="list-menu-item dropdown-list-item" (click)="startEditList($event, list)">
              Edit
            </button>

            <button type="button" class="list-menu-item dropdown-list-item dropdown-list-item--danger"
              (click)="deleteList($event, list)">
              Delete
            </button>
          </div>
        </div>

        <!-- CONTENT -->
        <div class="list-main">
          <p class="list-name">
            {{ list.name }}
          </p>

          <div class="list-meta">
            <span class="meal-info-chip list-status" [ngClass]="'list-status--' + list.status.toLowerCase()">
              {{ list.status }}
            </span>
          </div>
        </div>
      </div>

    </div>

    <ng-template #empty>
      <p class="lists-empty">No grocery lists yet.</p>
    </ng-template>

  </ng-container>
</section>
