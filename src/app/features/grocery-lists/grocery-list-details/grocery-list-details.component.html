<section class="grocery-list-details-page">
  <div class="grocery-list-details-loading-shell" *ngIf="isLoading">
    <app-page-loading></app-page-loading>
  </div>

  <ng-container *ngIf="!isLoading">
    <p *ngIf="error" class="grocery-error">{{ error }}</p>

    <ng-container *ngIf="!error && groceryList">
      <div class="grocery-list-details-shell">
        <div class="grocery-list-details-header">
          <div class="grocery-list-details-header-left">
            <button type="button" class="back-link" (click)="goBack()">
              <span class="back-link__icon">←</span>
              <span class="back-link__text">Lists</span>
            </button>

            <h1 class="grocery-list-title">{{ groceryList.name }}</h1>
          </div>

          <span class="meal-info-chip">
            {{ groceryList.status | titlecase }}
          </span>
        </div>

        <div *ngIf="isReadOnly" class="read-only-banner">
          <div class="read-only-banner__content">
            <p class="read-only-banner__text">
              This list is {{ groceryList.status }} and read-only.
            </p>

            <button type="button" class="read-only-banner__button" (click)="continueList()">
              Continue list
            </button>
          </div>
        </div>

        <div class="add-item-row">
          <input type="text" [(ngModel)]="newItemName" class="add-item-input" [disabled]="isReadOnly"
            placeholder="Add item..." />

          <button class="add-item-button" (click)="addItem()" [disabled]="isReadOnly">
            Add
          </button>
        </div>

        <div *ngIf="groceryItems.length > 0; else noItems" class="grocery-items-list">
          <div class="grocery-item" *ngFor="let item of groceryItems"
            [class.grocery-item--editing]="editingItemId === item.id">
            <ng-container *ngIf="editingItemId !== item.id; else editMode">
              <div class="grocery-item-main" (click)="!isReadOnly && toggleItem(item)">
                <span class="grocery-item-checkbox" [class.grocery-item-checkbox--checked]="item.status === 'bought'">
                  {{ item.status === 'bought' ? '✓' : '' }}
                </span>

                <div class="grocery-item-content" *ngIf="getItemMetaParts(item) as meta">
                  <p class="grocery-item-name" [class.grocery-item-name--bought]="item.status === 'bought'">
                    {{ item.name }}
                  </p>

                  <p class="grocery-item-status">
                    <span>
                      Added by
                      <strong *ngIf="meta.isAddedByYou; else addedName">You</strong>
                      <ng-template #addedName>{{ meta.addedByName }}</ng-template>
                    </span>

                    <span *ngIf="meta.isBought">
                      &nbsp;·&nbsp;
                      Bought by
                      <strong *ngIf="meta.isBoughtByYou; else boughtName">You</strong>
                      <ng-template #boughtName>{{ meta.boughtByName }}</ng-template>
                    </span>
                  </p>
                </div>
              </div>

              <div class="grocery-item-actions-wrapper">
                <button type="button" class="grocery-item-actions" (click)="toggleItemMenu($event, item)"
                  aria-label="Open grocery item actions">
                  ⋯
                </button>
                <div *ngIf="openItemMenuId === item.id && !isMobileViewport()" class="grocery-item-menu">
                  <button *ngIf="!isReadOnly" class="grocery-item-menu-item" (click)="startEditItem($event, item)">
                    Edit
                  </button>
                  <button *ngIf="!isReadOnly" class="grocery-item-menu-item grocery-item-menu-item--danger"
                    (click)="deleteItem($event, item)">
                    Delete
                  </button>
                </div>
              </div>
            </ng-container>

            <ng-template #editMode>
              <div class="grocery-item-edit" (click)="$event.stopPropagation()">
                <input type="text" [(ngModel)]="editItemName" class="grocery-item-edit-input" placeholder="Edit item" />

                <div class="grocery-item-edit-actions">
                  <button type="button" class="grocery-item-edit-save" (click)="saveEditedItem()">
                    Save
                  </button>

                  <button type="button" class="grocery-item-edit-cancel" (click)="cancelEditItem()">
                    Cancel
                  </button>
                </div>
              </div>
            </ng-template>
          </div>
        </div>

        <ng-template #noItems>
          <p class="grocery-empty">No items yet.</p>
        </ng-template>
      </div>
    </ng-container>
  </ng-container>
</section>

<app-responsive-action-menu *ngIf="selectedItemForActions" [isOpen]="true" [title]="selectedItemForActions.name"
  [subtitle]="''" [actions]="itemActions" (closed)="selectedItemForActions = null"
  (actionSelected)="onItemActionSelected($event)"></app-responsive-action-menu>
