<section class="grocery-list-details-page">
  <div class="grocery-list-details-loading-shell" *ngIf="isLoading">
    <app-page-loading></app-page-loading>
  </div>

  <ng-container *ngIf="!isLoading">
    <p *ngIf="error" class="grocery-error">{{ error }}</p>

    <ng-container *ngIf="!error && groceryList">
      <div class="grocery-list-details-shell">
        <div class="grocery-list-details-header">
          <button type="button" class="back-link" (click)="goBack()">
            <span class="back-link__icon">←</span>
            <span class="back-link__text">Lists</span>
          </button>

          <button
            *ngIf="!isReadOnly"
            type="button"
            class="action-pill action-pill--complete"
            (click)="onCompleteList()"
          >
            Complete
          </button>

          <span
            *ngIf="isReadOnly"
            class="list-status-chip"
            [ngClass]="'list-status--' + groceryList.status.toLowerCase()"
          >
            {{ groceryList.status }}
          </span>
        </div>

        <h1 class="grocery-list-title">{{ groceryList.name }}</h1>

        <div *ngIf="isReadOnly" class="read-only-inline">
          <p class="read-only-inline__text">
            This list is {{ groceryList.status }} and read-only.
          </p>
        </div>

        <div *ngIf="!isReadOnly" class="add-item-row">
          <input
            type="text"
            [(ngModel)]="newItemName"
            class="input-field"
            placeholder="Add item..."
          />

          <button class="action-pill action-pill--primary" (click)="addItem()">
            Add
          </button>
        </div>

        <div *ngIf="groceryItems.length > 0; else noItems" class="grocery-items-list">
          <div class="grocery-item" *ngFor="let item of groceryItems">
            <div class="grocery-item-main" (click)="!isReadOnly && toggleItem(item)">
              <span
                class="grocery-item-checkbox"
                [class.grocery-item-checkbox--checked]="item.status === 'bought'"
              >
                {{ item.status === 'bought' ? '✓' : '' }}
              </span>

              <div class="grocery-item-content" *ngIf="getItemMetaParts(item) as meta">
                <p
                  class="grocery-item-name"
                  [class.grocery-item-name--bought]="item.status === 'bought'"
                >
                  {{ item.name }}
                </p>

                <p class="grocery-item-status">
                  <span>
                    Added by
                    <strong *ngIf="meta.isAddedByYou; else addedName">You</strong>
                    <ng-template #addedName>{{ meta.addedByName }}</ng-template>
                  </span>

                  <span *ngIf="meta.isBought">
                    &nbsp;·&nbsp;
                    Bought by
                    <strong *ngIf="meta.isBoughtByYou; else boughtName">You</strong>
                    <ng-template #boughtName>{{ meta.boughtByName }}</ng-template>
                  </span>
                </p>
              </div>
            </div>

            <div class="grocery-item-actions-wrapper">
              <button
                type="button"
                class="grocery-item-actions"
                (click)="toggleItemMenu($event, item)"
                aria-label="Open grocery item actions"
              >
                ⋯
              </button>

              <div
                *ngIf="openItemMenuId === item.id && !isMobileViewport()"
                class="grocery-item-menu"
              >
                <button
                  *ngIf="!isReadOnly"
                  class="grocery-item-menu-item"
                  (click)="openEditDialog($event, item)"
                >
                  Edit
                </button>

                <button
                  *ngIf="!isReadOnly"
                  class="grocery-item-menu-item grocery-item-menu-item--danger"
                  (click)="openDeleteDialog($event, item)"
                >
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>

        <ng-template #noItems>
          <p class="grocery-empty">No items yet.</p>
        </ng-template>
      </div>
    </ng-container>
  </ng-container>
</section>

<app-responsive-action-menu
  *ngIf="selectedItemForActions"
  [isOpen]="true"
  [title]="selectedItemForActions.name"
  [subtitle]="''"
  [actions]="itemActions"
  (closed)="selectedItemForActions = null"
  (actionSelected)="onItemActionSelected($event)"
></app-responsive-action-menu>

<div class="dialog-overlay dialog-overlay--form" *ngIf="isEditDialogOpen" (click)="closeEditDialog()">
  <div class="dialog-shell dialog-shell--form" (click)="$event.stopPropagation()">
    <app-edit-text-dialog
      [title]="'Edit item'"
      [subtitle]="''"
      [label]="'Item name'"
      [value]="editItemName"
      [placeholder]="'Enter item name'"
      [confirmLabel]="'Save'"
      [cancelLabel]="'Cancel'"
      (valueChange)="editItemName = $event"
      (cancel)="closeEditDialog()"
      (confirm)="confirmEditItem()"
    ></app-edit-text-dialog>
  </div>
</div>

<div class="dialog-overlay" *ngIf="isDeleteDialogOpen" (click)="closeDeleteDialog()">
  <div class="dialog-shell" (click)="$event.stopPropagation()">
    <app-confirmation-dialog
      [title]="'Delete item?'"
      [message]="getDeleteMessage()"
      [cancelLabel]="'Cancel'"
      [confirmLabel]="'Delete'"
      (cancel)="closeDeleteDialog()"
      (confirm)="confirmDeleteItem()"
    ></app-confirmation-dialog>
  </div>
</div>

<div class="dialog-overlay" *ngIf="isPantryDialogOpen" (click)="closePantryDialog()">
  <div class="dialog-shell" (click)="$event.stopPropagation()">
    <app-pantry-action-dialog
      [title]="pantryDialogTitle"
      [message]="pantryDialogMessage"
      [showSkip]="pantryDialogShowSkip"
      [showArchive]="false"
      (action)="onPantryDialogAction($event)"
    >
    </app-pantry-action-dialog>
  </div>
</div>

<app-snackbar
  [isVisible]="!!toastMessage"
  [message]="toastMessage"
  [actionLabel]="toastActionLabel"
  (actionClicked)="onToastAction()"
></app-snackbar>
