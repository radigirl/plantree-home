<div class="measurement-sheet">
  <div class="measurement-sheet__header">
    <div class="measurement-sheet__heading">
      <h2 class="measurement-sheet__title">{{ 'measurementSheet.title' | translate }}</h2>

      <p class="measurement-sheet__item" *ngIf="itemName">
       {{ 'measurementSheet.forItem' | translate }} <strong>{{ displayItemName }}</strong>
      </p>

      <p class="measurement-sheet__info">
        <ng-container *ngIf="mergeResultHint; else existingBlock">
          {{ mergeResultHint }}
        </ng-container>

        <ng-template #existingBlock>
          <ng-container *ngIf="existingMatchLabel">
            {{ 'measurementSheet.alreadyInList' | translate }} <strong>{{ existingMatchLabel }}</strong>
          </ng-container>
        </ng-template>
      </p>

      <p class="measurement-sheet__hint">
        {{ currentExampleHint }}
      </p>
    </div>
  </div>

  <div class="measurement-sheet__body">
    <div class="measurement-sheet__field-group">
      <label class="measurement-sheet__label" for="measurement-amount">
        {{ 'measurementSheet.amount' | translate }}
      </label>

      <input id="measurement-amount" type="number" min="0" step="any" inputmode="decimal" [(ngModel)]="amount"
        class="input-field" [placeholder]="amountPlaceholder" />
    </div>

    <div class="measurement-sheet__field-group">
      <label class="measurement-sheet__label" for="measurement-unit">
        {{ 'measurementSheet.unit' | translate }}
      </label>

      <div class="select-wrapper">
        <select id="measurement-unit" [(ngModel)]="unit" class="input-field">
          <option value=""> {{ 'measurementSheet.selectUnit' | translate }} </option>
          <option *ngFor="let u of unitOptions" [value]="u">{{ u }}</option>
        </select>
      </div>
    </div>

    <label class="measurement-sheet__remember">
      <input type="checkbox" [(ngModel)]="remember" class="measurement-sheet__checkbox" />
      <span>{{ 'measurementSheet.remember' | translate }}</span>
    </label>
  </div>

  <div class="measurement-sheet__footer">
    <button type="button" class="measurement-sheet__button btn-secondary" (click)="onSkip()">
      {{ 'measurementSheet.skip' | translate }}
    </button>

    <button type="button" class="measurement-sheet__button btn-primary" (click)="onApply()"
      [disabled]="amount === null || !unit">
      {{ 'measurementSheet.apply' | translate }}
    </button>
  </div>
</div>
