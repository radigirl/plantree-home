<section class="manage-ingredient-rules-page">
  <div class="page-header-row">
    <div class="page-header">
      <h1 class="page-title">
        {{ 'settings.ingredientRules' | translate }}
      </h1>

      <p class="page-subtitle">
        {{ 'settings.ingredientRulesSubtitle' | translate }}
      </p>
    </div>
  </div>

  <!-- Word rules -->
  <div class="rules-section">
    <div class="rules-section__header">
      <button type="button" class="rules-section__toggle" (click)="toggleWordRules()">
        <span class="rules-section__chevron">
          {{ isWordRulesExpanded ? '▾' : '▸' }}
        </span>

        <span>
          <h2>{{ 'ingredientRulesPage.wordRulesTitle' | translate }}</h2>
          <p>{{ 'ingredientRulesPage.wordRulesSubtitle' | translate }}</p>
        </span>
      </button>

      <button type="button" class="action-pill action-pill--primary" (click)="onAddWordRule()">
        + {{ 'common.add' | translate }}
      </button>
    </div>

    <div class="rules-list" *ngIf="isWordRulesExpanded">
      <div class="rules-row" *ngFor="let rule of wordRules" (click)="onEditWordRule(rule)">
        <div class="rules-row__main">
          <span class="rules-row__title">
            {{ rule.singular_text }}
          </span>
          <span class="rules-row__meta">
            → {{ rule.plural_text }}
          </span>
        </div>
        <button type="button" class="rules-row__delete" (click)="onDeleteWordRule(rule, $event)"
          [attr.aria-label]="'common.delete' | translate">
          ×
        </button>
      </div>
    </div>
  </div>

  <!-- Measurement rules -->
  <div class="rules-section">
    <div class="rules-section__header">
      <button type="button" class="rules-section__toggle" (click)="toggleMeasurementRules()">
        <span class="rules-section__chevron">
          {{ isMeasurementRulesExpanded ? '▾' : '▸' }}
        </span>

        <span>
          <h2>{{ 'ingredientRulesPage.measurementRulesTitle' | translate }}</h2>
          <p>{{ 'ingredientRulesPage.measurementRulesSubtitle' | translate }}</p>
        </span>
      </button>

      <button type="button" class="action-pill action-pill--primary" (click)="onAddMeasurementRule()">
        + {{ 'common.add' | translate }}
      </button>
    </div>

    <div class="rules-list" *ngIf="isMeasurementRulesExpanded">
      <div class="rules-row" *ngFor="let rule of measurementRules" (click)="onEditMeasurementRule(rule)">
        <div class="rules-row__main">
          <span class="rules-row__title">
            {{ rule.ingredient_name }}
          </span>

          <span class="rules-row__meta">
            {{ formatMeasurementRule(rule) }}
          </span>
        </div>

        <button type="button" class="rules-row__delete" (click)="onDeleteMeasurementRule(rule, $event)"
          [attr.aria-label]="'common.delete' | translate">
          ×
        </button>
      </div>
    </div>
  </div>
</section>

<app-ingredient-rule-dialog [isOpen]="isRuleDialogOpen" [mode]="ruleDialogMode" [type]="ruleDialogType"
  [initialSingularText]="selectedWordRule?.singular_text || ''"
  [initialPluralText]="selectedWordRule?.plural_text || ''"
  [initialIngredientName]="selectedMeasurementRule?.ingredient_name || ''"
  [initialMeasurementStyle]="selectedMeasurementRule?.measurement_style || 'cup'"
  [initialConvertedAmount]="selectedMeasurementRule?.converted_amount || null"
  [initialConvertedUnit]="selectedMeasurementRule?.converted_unit || 'g'" (closed)="closeRuleDialog()"
  (saved)="onRuleDialogSave($event)" (deleteRule)="onRuleDialogDelete()">
</app-ingredient-rule-dialog>

<div *ngIf="ruleConfirm" class="rule-confirmation-backdrop" (click)="cancelRuleConfirm()">
  <div class="rule-confirmation-dialog-wrap" (click)="$event.stopPropagation()">
    <app-confirmation-dialog [title]="ruleConfirm?.action === 'override'
    ? ('ingredientRulesPage.overrideConfirmTitle' | translate)
    : ('ingredientRulesPage.deleteConfirmTitle' | translate)" [message]="ruleConfirm?.action === 'override'
    ? ('ingredientRulesPage.overrideConfirmMessage' | translate)
    : ('ingredientRulesPage.deleteConfirmMessage' | translate)" [cancelLabel]="'common.cancel' | translate"
      [confirmLabel]="ruleConfirm?.action === 'override'
    ? ('ingredientRulesPage.overrideConfirmButton' | translate)
    : ('common.delete' | translate)" (cancel)="cancelRuleConfirm()" (confirm)="confirmRuleAction()">
    </app-confirmation-dialog>
  </div>
</div>

<app-snackbar [message]="toastMessage" [isVisible]="isToastVisible">
</app-snackbar>
