<div class="pantry-review-backdrop" *ngIf="isOpen" (click)="onClose()">
  <div class="pantry-review-dialog" (click)="$event.stopPropagation()">
    <div class="pantry-review-header">
      <h2>{{ 'pantryMoveReview.title' | translate }}</h2>
      <p>
        {{ 'pantryMoveReview.description' | translate }}
      </p>
      <p class="pantry-review-hint">
        {{ 'pantryMoveReview.tapToEdit' | translate }}
      </p>
    </div>

    <div class="pantry-review-list">
      <div class="pantry-review-row" *ngFor="let row of rows" [class.is-expanded]="isRowExpanded(row)">
        <div class="pantry-review-row__main">
          <input type="checkbox" class="pantry-review-checkbox" [(ngModel)]="row.selected"
            (click)="$event.stopPropagation()" />

          <button type="button" class="pantry-review-row__preview" (click)="toggleRow(row)">
            {{ getPreviewText(row) }}
          </button>

          <div class="pantry-review-row__mode-toggle" *ngIf="isRowExpanded(row)">
            <button type="button" [class.is-active]="getRowMode(row) === 'measured'"
              (click)="setRowMode(row, 'measured')">
              {{ 'pantryMoveReview.modeMeasured' | translate }}
            </button>

            <button type="button" [class.is-active]="getRowMode(row) === 'countable'"
              (click)="setRowMode(row, 'countable')">
              {{ 'pantryMoveReview.modeCountable' | translate }}
            </button>

            <button type="button" [class.is-active]="getRowMode(row) === 'simple'" (click)="setRowMode(row, 'simple')">
              —
            </button>
          </div>
        </div>

        <div class="pantry-review-row__editor" *ngIf="isRowExpanded(row)">
          <div class="pantry-review-row__fields">

            <!-- measured -->
            <ng-container *ngIf="getRowMode(row) === 'measured'">

              <div class="pantry-review-row__quantity">
                <input type="text" [(ngModel)]="row.measuredAmount" (ngModelChange)="row.amount = row.measuredAmount"
                  [placeholder]="'pantryMoveReview.amountPlaceholder' | translate" />

                <select [(ngModel)]="row.measuredUnit" (ngModelChange)="row.unit = row.measuredUnit">
                  <option value="g">g</option>
                  <option value="kg">kg</option>
                  <option value="ml">ml</option>
                  <option value="l">l</option>
                </select>
              </div>

              <input type="text" [(ngModel)]="row.pantryName"
                [placeholder]="'pantryMoveReview.namePlaceholder' | translate" />
            </ng-container>

            <!-- countable -->
            <ng-container *ngIf="getRowMode(row) === 'countable'">

              <input type="text" [(ngModel)]="row.countAmount" (ngModelChange)="row.amount = row.countAmount"
                [placeholder]="'pantryMoveReview.countPlaceholder' | translate" />

              <input type="text" [(ngModel)]="row.sizeAmount"
                [placeholder]="'pantryMoveReview.sizePlaceholder' | translate" />

              <select required [(ngModel)]="row.sizeUnit">
                <option [ngValue]="null">
                  {{ 'pantryMoveReview.unitPlaceholder' | translate }}
                </option>
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="ml">ml</option>
                <option value="l">l</option>
              </select>

              <input type="text" [(ngModel)]="row.pantryName" [placeholder]="'pantryMoveReview.namePlaceholder' | translate" />
            </ng-container>

            <!-- simple -->
            <ng-container *ngIf="getRowMode(row) === 'simple'">
              <input type="text" [(ngModel)]="row.pantryName" [placeholder]="'pantryMoveReview.namePlaceholder' | translate" />
            </ng-container>

          </div>
          <p class="pantry-review-row__validation" *ngIf="shouldShowPackageValidation(row)">
            {{ 'pantryMoveReview.packageValidation' | translate }}
          </p>
        </div>
      </div>
    </div>

    <div class="pantry-review-footer">
      <button type="button" class="btn-secondary" (click)="onClose()">
        {{ 'pantryMoveReview.cancel' | translate }}
      </button>

      <button type="button" class="btn-primary" [disabled]="selectedCount === 0" (click)="onConfirm()">
        {{ 'pantryMoveReview.moveSelected' | translate }}
      </button>
    </div>
  </div>
</div>
