<div class="confirmation-dialog">
  <div class="confirmation-dialog__content">
    <h3 class="confirmation-dialog__title">{{ title }}</h3>
    <p class="confirmation-dialog__message">
      {{ getMessage() }}
    </p>
  </div>

  <div class="button-row confirmation-dialog__actions">
    <button
      type="button"
      class="btn-secondary"
      (click)="onCancel()"
    >
      {{ cancelLabel }}
    </button>

    <button
      type="button"
      class="btn-primary"
      (click)="onConfirm()"
    >
      {{ confirmLabel }}
    </button>
  </div>
</div>
