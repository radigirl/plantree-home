<ng-container *ngIf="candidates.length">
  <div class="merge-sheet-backdrop" (click)="onDismiss()">
    <div class="merge-sheet-panel" (click)="$event.stopPropagation()">

      <div class="merge-sheet-handle"></div>

      <div class="merge-sheet">
        <div class="merge-sheet__header">
          <h3>{{ 'mergeReview.title' | translate }}</h3>
          <p>{{ 'mergeReview.description' | translate }}</p>
        </div>

        <div class="merge-sheet__list">
          <div class="merge-item" *ngFor="let c of candidates; let i = index">
            <label class="merge-item__row">
              <input type="checkbox" [checked]="selectedMap[i]" (change)="toggle(i)" />

              <div class="merge-item__content">
                <div class="merge-item__pair">
                  <span class="singular">{{ c.singularText }}</span>
                  <span class="arrow">→</span>
                  <span class="plural">{{ c.pluralText }}</span>
                </div>

                <div class="merge-item__hint">
                  {{ ('mergeReview.hint' | translate).replace('{{name}}', c.pluralText) }}
                </div>
              </div>
            </label>
          </div>
        </div>

        <div class="merge-sheet__footer">
          <label class="merge-sheet__remember">
            <input type="checkbox" [(ngModel)]="remember" class="merge-sheet__checkbox" />
            <span>{{ 'mergeReview.remember' | translate }}</span>
          </label>

          <div class="merge-sheet__actions">
            <button class="btn-secondary" (click)="onSkip()">
              {{ 'mergeReview.skip' | translate }}
            </button>

            <button class="btn-primary" [disabled]="!hasSelected" (click)="onApply()">
              {{ 'mergeReview.merge' | translate }}
            </button>
          </div>
        </div>

      </div>

    </div>
  </div>
</ng-container>
