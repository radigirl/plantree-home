<ng-container *ngIf="isOpen">
  <div class="pantry-item-sheet-backdrop" [class.pantry-item-sheet-backdrop--desktop]="isDesktop"
    (click)="onBackdropClick($event)">
    <div class="pantry-item-sheet" (click)="$event.stopPropagation()">
      <div class="pantry-item-sheet__handle" (click)="close()"></div>

      <div class="pantry-item-sheet__header">
        <p class="pantry-item-sheet__title">{{ title }}</p>
      </div>

      <div class="pantry-item-sheet__content">

        <!-- Name -->
        <div class="pantry-item-sheet__field">
          <label class="pantry-item-sheet__label">Name</label>
          <input type="text" class="pantry-item-sheet__input" [(ngModel)]="name" (ngModelChange)="updateNameError()"
            placeholder="e.g. Milk" />
        </div>

        <p class="pantry-item-sheet__error-slot" [class.is-visible]="!!nameErrorMessage">
          {{ nameErrorMessage || '\u00A0' }}
        </p>

        <!-- Type switcher -->
        <app-toggle-switch [options]="[
    { label: 'Countable', value: 'countable' },
    { label: 'Measured', value: 'measured' }
  ]" [value]="type" (valueChange)="onTypeChange($event)"></app-toggle-switch>

        <!-- Helper -->
        <p class="pantry-item-sheet__helper">
          {{ type === 'measured' ? '· by weight or by volume' : '· pcs, bottles, packs' }}
        </p>

        <!-- COUNTABLE -->
        <ng-container *ngIf="type === 'countable'; else measuredFields">
          <div class="pantry-item-sheet__row">
            <div class="pantry-item-sheet__field pantry-item-sheet__field--right">
              <label class="pantry-item-sheet__label">Quantity</label>
              <input type="number" min="1" step="1" class="pantry-item-sheet__input" [(ngModel)]="amount" />
            </div>
          </div>

          <div class="pantry-item-sheet__row">
            <div class="pantry-item-sheet__field pantry-item-sheet__field--left">
              <label class="pantry-item-sheet__label">Unit</label>
              <select class="pantry-item-sheet__input" [(ngModel)]="sizeUnit" (ngModelChange)="updateSizeUnitError()">
                <option value="">No unit</option>
                <option *ngFor="let u of unitOptions" [value]="u">{{ u }}</option>
              </select>
            </div>

            <div class="pantry-item-sheet__field pantry-item-sheet__field--right">
              <label class="pantry-item-sheet__label">Size</label>
              <input type="number" min="0" step="any" class="pantry-item-sheet__input" [(ngModel)]="sizeAmount"
                (ngModelChange)="updateSizeUnitError()" [placeholder]="sizePlaceholder" />
            </div>
          </div>
        </ng-container>

        <!-- MEASURED -->
        <ng-template #measuredFields>
          <div class="pantry-item-sheet__row">
            <div class="pantry-item-sheet__field pantry-item-sheet__field--right">
              <label class="pantry-item-sheet__label">Unit</label>
              <select class="pantry-item-sheet__input" [(ngModel)]="sizeUnit" (ngModelChange)="updateSizeUnitError()">
                <option value="">Select unit</option>
                <option *ngFor="let u of unitOptions" [value]="u">{{ u }}</option>
              </select>
            </div>
          </div>

          <div class="pantry-item-sheet__row">
            <div class="pantry-item-sheet__field pantry-item-sheet__field--right">
              <label class="pantry-item-sheet__label">Size</label>
              <input type="number" min="0" step="any" class="pantry-item-sheet__input" [(ngModel)]="sizeAmount"
                (ngModelChange)="updateSizeUnitError()" [placeholder]="sizePlaceholder" />
            </div>
          </div>
        </ng-template>

        <!-- Error slot -->
        <p class="pantry-item-sheet__error-slot" [class.is-visible]="!!errorMessage">
          {{ errorMessage || '\u00A0' }}
        </p>

        <!-- Expiry -->
        <div class="pantry-item-sheet__field">
          <label class="pantry-item-sheet__label">Expiry date</label>
          <div class="pantry-item-sheet__date-input">
            <input type="text" class="pantry-item-sheet__input pantry-item-sheet__input--date"
              [value]="formatDateForDisplay(expiryDate)" placeholder="dd-mm-yyyy" readonly (click)="openCalendar()" />

            <button type="button" class="pantry-item-sheet__date-button" (click)="openCalendar()"
              aria-label="Open calendar">
              <lucide-icon [img]="calendarIcon"></lucide-icon>
            </button>
          </div>
        </div>

        <!-- Meta -->
        <div *ngIf="mode === 'edit' && createdAtLabel" class="pantry-item-sheet__meta">
          <span class="pantry-item-sheet__meta-label">Added on</span>
          <span class="pantry-item-sheet__meta-value">
            {{ createdAtLabel }}
          </span>
        </div>

      </div>

      <!-- Footer -->
      <div class="pantry-item-sheet__footer button-row">
        <button type="button" class="pantry-item-sheet__button btn-secondary" (click)="close()">
          Cancel
        </button>

        <button type="button" class="pantry-item-sheet__button btn-primary" (click)="save()">
          {{ submitLabel }}
        </button>
      </div>
    </div>
  </div>
</ng-container>

<div class="calendar-picker-sheet-overlay" *ngIf="isCalendarOpen" (click)="onCalendarBackdropClick($event)">

  <div class="calendar-picker-sheet" (click)="$event.stopPropagation()">
    <div class="calendar-picker-sheet__handle"></div>

    <app-calendar-picker [title]="'Pick a date'" [selectionMode]="'single'" [selectedDates]="selectedCalendarDates"
      [showFooterActions]="false" [autoConfirmOnSingleSelect]="true"
      (selectedDatesChange)="onCalendarDatesChange($event)" (confirm)="confirmCalendarDates($event)">
    </app-calendar-picker>

  </div>
</div>
