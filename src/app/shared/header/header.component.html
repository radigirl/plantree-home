<header class="header">
  <div class="logo-area">
    <div class="logo">
      <img src="assets/logo.png" alt="Plantree logo" />
    </div>

    <div class="title-group">
      <div class="title">Plantree</div>
      <div class="subtitle">FROM PLAN TO PANTRY</div>
    </div>
  </div>

  <div class="right-controls">
    <div class="space-switcher" *ngIf="currentSpace$ | async as currentSpace">
      <button type="button" class="space-trigger" (click)="toggleSpaceMenu()" [attr.aria-expanded]="isSpaceMenuOpen"
        aria-label="Open space switcher">
        <span class="space-label">{{ currentSpace.name }}</span>
        <span class="chevron">▾</span>
      </button>

      <div class="space-menu" *ngIf="isSpaceMenuOpen">

        <div class="space-menu-scroll">
          <button type="button" class="space-menu-item" *ngFor="let space of orderedSpaces" (click)="selectSpace(space)"
            [class.is-active]="space.id === currentSpace.id">

            <span class="space-menu-item__content">
              <span>{{ space.name }}</span>

              <lucide-icon *ngIf="space.id === currentSpace.id" class="space-check" [img]="checkIcon" [size]="18">
              </lucide-icon>
            </span>
          </button>
        </div>

        <div class="space-divider"></div>

        <button class="space-menu-item add-item" (click)="onAddSpace()">
          <span class="add-space-circle">+</span>
          <span>{{ 'spaces.addSpace' | translate }}</span>
        </button>

      </div>
    </div>

    <div class="member-switcher">
      <app-avatar-menu [members]="members" [currentMember]="currentMember$ | async" [closeSignal]="avatarCloseSignal"
        (menuOpened)="onAvatarMenuOpened()" (memberSelected)="selectMember($event)">
      </app-avatar-menu>
    </div>
  </div>
</header>

<app-space-dialog [isOpen]="isSpaceDialogOpen" mode="add" [initialName]="spaceDialogInitialName"
  (closed)="closeSpaceDialog()" (saved)="onSpaceDialogSave($event)">
</app-space-dialog>
