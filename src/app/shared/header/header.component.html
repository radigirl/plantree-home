<header class="header">
  <div class="logo-area">
    <div class="logo">
      <img src="assets/logo.png" alt="Plantree logo">
    </div>

    <div class="title-group">
      <div class="title">Plantree</div>
      <div class="subtitle">FROM PLAN TO PANTRY</div>
    </div>
  </div>

  <div class="user-switcher">
    <button
      type="button"
      class="account-circle"
      (click)="toggleMemberMenu()"
      [attr.aria-expanded]="isUserMenuOpen"
      aria-label="Open member switcher"
    >
      <ng-container *ngIf="currentMember$ | async as currentMember; else fallbackIcon">
        <img
          *ngIf="currentMember?.avatar_url; else fallbackIcon"
          [src]="currentMember.avatar_url"
          [alt]="currentMember.name || 'Current member'"
          class="account-avatar"
        />
      </ng-container>

      <ng-template #fallbackIcon>
        <lucide-icon [img]="userIcon"></lucide-icon>
      </ng-template>
    </button>

    <div class="user-menu" *ngIf="isUserMenuOpen">
      <button
        type="button"
        class="user-menu-item"
        *ngFor="let member of members"
        (click)="selectMember(member)"
      >
        <img
          [src]="member.avatar_url || 'assets/avatars/avatar-placeholder.png'"
          [alt]="member.name"
          class="user-menu-avatar"
        />

        <span>{{ member.name }}</span>
      </button>
    </div>
  </div>
</header>
